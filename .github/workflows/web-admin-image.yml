name: Web Admin Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/web-admin-image.yml"
      - "web-admin/**"
  workflow_dispatch:

env:
  WEB_ADMIN_IMAGE: ghcr.io/ky-wyc/yh-hh-web-admin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./web-admin
          file: ./web-admin/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_ADMIN_IMAGE }}:latest
            ${{ env.WEB_ADMIN_IMAGE }}:${{ github.sha }}
