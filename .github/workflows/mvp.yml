name: MVP Verification

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web-admin/pnpm-lock.yaml

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: web-admin
        run: pnpm install --frozen-lockfile

      - name: Validate shell scripts
        run: sh -n scripts/*.sh

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: |
          docker build -t qqbot-bot-app .
          docker build -t qqbot-web-admin ./web-admin

      - name: Run MVP checks with smoke
        run: python scripts/check_all.py --pnpm pnpm --with-smoke
